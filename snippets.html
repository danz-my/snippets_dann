<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snippets — SnippetHub</title>
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <img src="assets/icon.jpg" alt="Logo" class="logo-img">
        SnippetHub
      </a>
      <div class="nav-links" id="navLinks">
        <a href="index.html" class="nav-link">Home</a>
        <a href="snippets.html" class="nav-link active">Snippets</a>
      </div>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
    <div class="mobile-menu" id="mobileMenu">
      <a href="index.html" class="mob-link">Home</a>
      <a href="snippets.html" class="mob-link active">Snippets</a>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1 class="page-title reveal-up">All <em>Snippets</em></h1>
      <p class="page-sub reveal-up d1">Semua snippet yang tersimpan via bot</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="toolbar reveal-up">
        <div class="search-wrap">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input class="search-input" id="searchBox" type="text" placeholder="Cari judul, author, code..." oninput="applyFilter()"/>
        </div>
        <select class="filter-select" id="langFilter" onchange="applyFilter()">
          <option value="">Semua Bahasa</option>
        </select>
        <select class="filter-select" id="sortSelect" onchange="applyFilter()">
          <option value="newest">Terbaru</option>
          <option value="oldest">Terlama</option>
          <option value="az">A–Z</option>
        </select>
      </div>

      <div class="result-info" id="resultInfo"></div>
      <div class="cards-grid" id="snippetsGrid">
        <div class="loading-row"><div class="spinner"></div></div>
      </div>
    </div>
  </section>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal-box">
      <div class="modal-head">
        <div class="modal-head-info">
          <div class="modal-lang-badge" id="modalLang">JS</div>
          <div>
            <div class="modal-title" id="modalTitle">—</div>
            <div class="modal-meta-row">
              <span class="modal-author" id="modalAuthor">—</span>
              <span class="modal-sep">·</span>
              <span id="modalDate">—</span>
            </div>
          </div>
        </div>
        <button class="modal-close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-code-wrap">
        <pre><code id="modalCode" class="hljs"></code></pre>
      </div>
      <div class="modal-foot">
        <span class="modal-lines" id="modalLines">— baris</span>
        <div class="modal-foot-btns">
          <button class="btn-copy-modal" id="btnCopy" onclick="copyCode()">
            <i class="fa-solid fa-copy"></i> Salin Code
          </button>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <span class="footer-logo">
        <img src="assets/icon.jpg" alt="Logo" class="logo-img-footer">
        SnippetHub
      </span>
      <span class="footer-copy">Powered by WhatsApp Bot</span>
    </div>
  </footer>

  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
  <script>
    initNav();
    let allSnippets = [];
    let currentCode = '';

    async function initSnippets() {
      const db = await fetchSnippets();
      allSnippets = (db.snippets || []).sort((a,b) => b.createdAt - a.createdAt);

      const langs = [...new Set(allSnippets.map(s => s.language || 'JavaScript'))].sort();
      const lf = document.getElementById('langFilter');
      langs.forEach(l => lf.innerHTML += `<option value="${l}">${l}</option>`);

      const params = new URLSearchParams(window.location.search);
      if (params.get('lang')) lf.value = params.get('lang');
      if (params.get('author')) document.getElementById('searchBox').value = params.get('author');

      applyFilter();
    }

    function applyFilter() {
      const q    = document.getElementById('searchBox').value.toLowerCase();
      const lang = document.getElementById('langFilter').value;
      const sort = document.getElementById('sortSelect').value;

      let filtered = allSnippets.filter(s => {
        const matchQ = !q || s.title.toLowerCase().includes(q) || s.author.toLowerCase().includes(q) || s.code.toLowerCase().includes(q) || (s.id||'').toLowerCase().includes(q);
        const matchL = !lang || (s.language || 'JavaScript') === lang;
        return matchQ && matchL;
      });

      if (sort === 'newest') filtered.sort((a,b) => b.createdAt - a.createdAt);
      else if (sort === 'oldest') filtered.sort((a,b) => a.createdAt - b.createdAt);
      else if (sort === 'az') filtered.sort((a,b) => a.title.localeCompare(b.title));

      document.getElementById('resultInfo').textContent = `${filtered.length} snippet ditemukan`;
      const grid = document.getElementById('snippetsGrid');
      if (!filtered.length) {
        grid.innerHTML = '<p class="empty-msg">Tidak ada snippet yang cocok</p>';
        return;
      }
      grid.innerHTML = filtered.map(s => snippetCard(s, true)).join('');
      revealOnScroll();
    }

    function openModal(id) {
      const s = allSnippets.find(x => x.id === id);
      if (!s) return;
      currentCode = s.code;
      document.getElementById('modalTitle').textContent  = s.title;
      document.getElementById('modalAuthor').textContent = '@' + s.author;
      document.getElementById('modalDate').textContent   = new Date(s.createdAt).toLocaleDateString('id-ID', {day:'numeric',month:'short',year:'numeric'});
      document.getElementById('modalLines').textContent  = s.code.split('\n').length + ' baris';
      const langBadge = document.getElementById('modalLang');
      langBadge.textContent = s.language || 'JS';
      langBadge.style.background = langColor(s.language || 'JavaScript') + '22';
      langBadge.style.color = langColor(s.language || 'JavaScript');
      langBadge.style.borderColor = langColor(s.language || 'JavaScript') + '55';
      const codeEl = document.getElementById('modalCode');
      codeEl.textContent = s.code;
      codeEl.className = 'hljs language-' + langClass(s.language || 'JavaScript');
      hljs.highlightElement(codeEl);
      document.getElementById('btnCopy').innerHTML = '<i class="fa-solid fa-copy"></i> Salin Code';
      document.getElementById('btnCopy').className = 'btn-copy-modal';
      document.getElementById('modalOverlay').classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('show');
      document.body.style.overflow = '';
    }

    function closeModalOutside(e) {
      if (e.target.id === 'modalOverlay') closeModal();
    }

    function copyCode() {
      navigator.clipboard.writeText(currentCode).then(() => {
        const btn = document.getElementById('btnCopy');
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Tersalin!';
        btn.className = 'btn-copy-modal copied';
        setTimeout(() => {
          btn.innerHTML = '<i class="fa-solid fa-copy"></i> Salin Code';
          btn.className = 'btn-copy-modal';
        }, 2000);
      });
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    window.openModal = openModal;
    initSnippets();
  </script>
</body>
</html>
